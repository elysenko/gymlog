apiVersion: apps/v1
kind: Deployment
metadata:
  name: gymlog
  namespace: colossus-gymlog
  labels:
    app: gymlog
    managed-by: colossus
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gymlog
  template:
    metadata:
      labels:
        app: gymlog
    spec:
      hostAliases:
        - ip: "192.168.50.250"
          hostnames:
            - "ubuntu.desmana-truck.ts.net"
      containers:
        - name: app
          image: ubuntu:30500/gymlog:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: app-secrets
                optional: true
