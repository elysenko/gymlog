server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Backend API — proxy to FastAPI on 127.0.0.1:3000
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static assets — return 404 rather than fall back to index.html
    location ~* \.(js|css|ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|map|webp)$ {
        try_files $uri =404;
    }

    # SPA fallback for react-router deep links
    location / {
        try_files $uri $uri/ /index.html;
    }
}
